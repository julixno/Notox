<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0c0c0e;
    --bg-elevated: #18181b;
    --bg-hover: #1f1f23;
    --red: #e0293a;
    --red-dim: #7a1420;
    --red-glow: rgba(224,41,58,0.35);
    --text: #ececec;
    --text-muted: #8c8c92;
    --border: #232327;
    --radius: 8px;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }

  ::selection { background: var(--red-dim); color: #fff; }
  button, select, input, textarea { font-family: inherit; }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ---------- Header ---------- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-elevated);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .brand h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin: 0;
    color: var(--text);
  }
  .brand h1 span { color: var(--red); }

  .save-indicator {
    font-size: 11.5px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .save-indicator .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
  }
  .save-indicator.unsaved .dot { background: var(--red); }
  .save-indicator.unsaved { color: var(--red); }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-btn {
    width: 38px;
    height: 38px;
    border-radius: 9px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color .12s ease, color .12s ease, background .12s ease;
  }
  .header-btn svg { width: 17px; height: 17px; }
  .header-btn:hover { border-color: var(--red); color: var(--red); }
  .header-btn:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }

  .header-btn.primary {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .header-btn.primary:hover {
    background: #c62230;
    box-shadow: 0 0 0 4px var(--red-glow);
    color: #fff;
  }

  .header-sep {
    width: 1px;
    height: 22px;
    background: var(--border);
    margin: 0 2px;
  }

  /* ---------- Main ---------- */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
  }

  .top-bar {
    display: flex;
    align-items: center;
    padding: 18px 28px 0;
  }

  .title-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 600;
    outline: none;
    padding: 4px 0;
    min-width: 0;
  }
  .title-input::placeholder { color: #4a4a4e; }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px;
    padding: 14px 24px;
    margin: 14px 28px 0;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .toolbar.hidden { display: none; }

  .tb-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .12s ease, border-color .12s ease;
  }
  .tb-btn:hover { background: var(--bg-hover); }
  .tb-btn.active { background: var(--red-dim); border-color: var(--red); color: #fff; }
  .tb-btn:focus-visible { outline: 2px solid var(--red); outline-offset: 1px; }
  .tb-btn.b { font-weight: 700; }
  .tb-btn.i { font-style: italic; font-family: Georgia, serif; }
  .tb-btn.u { text-decoration: underline; }
  .tb-btn.s { text-decoration: line-through; }

  .tb-sep {
    width: 1px;
    height: 22px;
    background: var(--border);
    margin: 0 6px;
  }

  .tb-select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12.5px;
    padding: 6px 8px;
    cursor: pointer;
    outline: none;
  }
  .tb-select:hover { border-color: var(--text-muted); }

  .editor-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 22px 28px 60px;
    position: relative;
  }

  .editor {
    max-width: 780px;
    min-height: 100%;
    outline: none;
    font-size: 15.5px;
    line-height: 1.65;
    color: var(--text);
  }
  .editor:empty::before {
    content: attr(data-placeholder);
    color: #4a4a4e;
  }

  .editor table.note-table {
    border-collapse: collapse;
    margin: 14px 0;
    width: 100%;
  }
  .editor table.note-table td {
    border: 1px solid var(--border);
    padding: 8px 10px;
    min-width: 60px;
    outline: none;
  }
  .editor table.note-table td:focus { background: var(--bg-elevated); }

  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    margin: 4px 0;
    padding: 2px 4px 2px 0;
    border-radius: 5px;
  }
  .checklist-item:hover { background: rgba(255,255,255,0.03); }
  .checklist-item input[type="checkbox"] {
    margin-top: 4px;
    width: 15px;
    height: 15px;
    accent-color: var(--red);
    cursor: pointer;
    flex-shrink: 0;
  }
  .checklist-item span {
    outline: none;
    flex: 1;
  }
  .checklist-item.checked span {
    text-decoration: line-through;
    color: var(--text-muted);
  }
  .checklist-del-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1;
    cursor: pointer;
    opacity: 0;
    padding: 2px 5px;
    border-radius: 4px;
    flex-shrink: 0;
    transition: opacity .12s ease, color .12s ease, background .12s ease;
  }
  .checklist-item:hover .checklist-del-btn { opacity: 1; }
  .checklist-del-btn:hover { color: var(--red); background: rgba(224,41,58,0.12); }

  /* ---------- Floating table toolbar ---------- */
  .table-toolbar {
    display: none;
    position: absolute;
    z-index: 10;
    align-items: center;
    gap: 3px;
    background: var(--bg-elevated);
    border: 1px solid var(--red-dim);
    border-radius: 7px;
    padding: 5px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
  }
  .table-toolbar button {
    background: none;
    border: none;
    color: var(--text);
    font-size: 11.5px;
    font-weight: 600;
    padding: 6px 8px;
    border-radius: 5px;
    cursor: pointer;
    white-space: nowrap;
  }
  .table-toolbar button:hover { background: var(--bg-hover); }
  .table-toolbar button.tt-delete { color: var(--red); }
  .table-toolbar button.tt-delete:hover { background: rgba(224,41,58,0.15); }
  .table-toolbar .tb-sep { margin: 0 2px; }

  /* ---------- Toolbar FAB ---------- */
  .toolbar-fab {
    position: fixed;
    right: 26px;
    bottom: 26px;
    z-index: 40;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: var(--red);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 18px rgba(0,0,0,0.45);
    transition: background .15s ease, box-shadow .15s ease, transform .1s ease;
  }
  .toolbar-fab svg { width: 21px; height: 21px; }
  .toolbar-fab:hover { background: #c62230; box-shadow: 0 0 0 6px var(--red-glow); }
  .toolbar-fab:active { transform: scale(0.95); }
  .toolbar-fab.active { background: var(--bg-elevated); border: 1px solid var(--red); color: var(--red); }
  .toolbar-fab:focus-visible { outline: 2px solid var(--red); outline-offset: 3px; }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  .modal-box {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px 24px;
    width: 280px;
  }
  .modal-box h3 {
    margin: 0 0 16px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
  }
  .modal-row {
    display: flex;
    gap: 14px;
    margin-bottom: 20px;
  }
  .modal-row label {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .modal-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 14px;
    outline: none;
  }
  .modal-row input:focus { border-color: var(--red); }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .modal-btn {
    border: none;
    border-radius: 6px;
    padding: 9px 14px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
  }
  .modal-btn.cancel { background: var(--bg-hover); color: var(--text-muted); }
  .modal-btn.cancel:hover { color: var(--text); }
  .modal-btn.confirm { background: var(--red); color: #fff; }
  .modal-btn.confirm:hover { background: #c62230; }

  @media (max-width: 640px) {
    .header { padding: 12px 16px; }
    .brand h1 { font-size: 16px; }
    .top-bar, .editor-wrap { padding-left: 16px; padding-right: 16px; }
    .toolbar { margin: 14px 16px 0; padding: 10px; }
    .save-indicator span:not(.dot) { display: none; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="brand">
      <h1>NOTOX<span>.</span></h1>
      <div class="save-indicator" id="saveIndicator"><span class="dot"></span><span id="saveIndicatorText">Gespeichert</span></div>
    </div>
    <div class="header-actions">
      <button class="header-btn primary" id="newNoteBtn" title="Neue Notiz">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="header-btn" id="importBtn" title="Notiz laden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
      </button>
      <button class="header-btn" id="exportBtn" title="Notiz speichern">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 21h16"/></svg>
      </button>
      <input type="file" id="importInput" accept="application/json,.json" style="display:none">
    </div>
  </header>

  <main class="main" id="mainView"></main>

  <button class="toolbar-fab" id="toolbarToggleBtn" title="Formatierung ein-/ausblenden">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"></path>
      <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
    </svg>
  </button>
</div>

<script>
(function(){
  const mainView = document.getElementById('mainView');
  const newNoteBtn = document.getElementById('newNoteBtn');
  const exportBtn = document.getElementById('exportBtn');
  const importBtn = document.getElementById('importBtn');
  const importInput = document.getElementById('importInput');
  const saveIndicator = document.getElementById('saveIndicator');
  const saveIndicatorText = document.getElementById('saveIndicatorText');
  const toolbarToggleBtn = document.getElementById('toolbarToggleBtn');

  let currentNote = { title: '', html: '' };
  let saveTimer = null;
  let toolbarVisible = false;
  let outsideClickHandler = null;
  let unsavedChanges = false;

  /* ---------- Toolbar FAB ---------- */
  toolbarToggleBtn.addEventListener('click', () => {
    toolbarVisible = !toolbarVisible;
    const toolbarEl = document.getElementById('toolbar');
    if (toolbarEl) toolbarEl.classList.toggle('hidden', !toolbarVisible);
    toolbarToggleBtn.classList.toggle('active', toolbarVisible);
  });

  /* ---------- Unsaved-changes indicator ---------- */
  function markUnsaved(){
    unsavedChanges = true;
    saveIndicator.classList.add('unsaved');
    saveIndicatorText.textContent = 'Ungespeichert';
  }
  function markSaved(){
    unsavedChanges = false;
    saveIndicator.classList.remove('unsaved');
    saveIndicatorText.textContent = 'Gespeichert';
  }

  /* ---------- JSON file export / import ---------- */
  function slugify(str){
    const s = (str || 'notiz').toLowerCase()
      .replace(/[äöüß]/g, c => ({ä:'ae',ö:'oe',ü:'ue',ß:'ss'}[c]))
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/(^-|-$)/g, '');
    return s || 'notiz';
  }

  function exportNote(){
    const titleInput = document.getElementById('titleInput');
    const editor = document.getElementById('editor');
    if (titleInput) currentNote.title = titleInput.value;
    if (editor) currentNote.html = editor.innerHTML;

    const payload = JSON.stringify({ title: currentNote.title, html: currentNote.html, updatedAt: Date.now() }, null, 2);
    const blob = new Blob([payload], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = slugify(currentNote.title) + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    markSaved();
  }

  function importNoteFromFile(file){
    const reader = new FileReader();
    reader.onload = () => {
      let parsed;
      try {
        parsed = JSON.parse(reader.result);
      } catch(e){
        alert('Die Datei ist keine gültige JSON-Datei.');
        return;
      }
      if (Array.isArray(parsed)) parsed = parsed[0];
      if (!parsed || typeof parsed !== 'object'){
        alert('Die Datei enthält keine gültige Notiz.');
        return;
      }
      if (unsavedChanges && !confirm('Ungespeicherte Änderungen gehen verloren. Trotzdem laden?')){
        return;
      }
      currentNote = {
        title: typeof parsed.title === 'string' ? parsed.title : '',
        html: typeof parsed.html === 'string' ? parsed.html : ''
      };
      markSaved();
      renderEditor();
    };
    reader.readAsText(file);
  }

  exportBtn.addEventListener('click', exportNote);
  importBtn.addEventListener('click', () => importInput.click());
  importInput.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (file) importNoteFromFile(file);
    importInput.value = '';
  });

  newNoteBtn.addEventListener('click', () => {
    if (unsavedChanges && !confirm('Ungespeicherte Änderungen gehen verloren. Neue Notiz erstellen?')) return;
    currentNote = { title: '', html: '' };
    markSaved();
    renderEditor();
    document.getElementById('titleInput').focus();
  });

  function escapeAttr(str){
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML.replace(/"/g, '&quot;');
  }

  /* ---------- Editor rendering ---------- */
  function renderEditor(){
    mainView.innerHTML = `
      <div class="top-bar">
        <input type="text" class="title-input" id="titleInput" placeholder="Titel der Notiz" value="${escapeAttr(currentNote.title)}">
      </div>
      <div class="toolbar${toolbarVisible ? '' : ' hidden'}" id="toolbar">
        <button class="tb-btn b" data-cmd="bold" title="Fett">B</button>
        <button class="tb-btn i" data-cmd="italic" title="Kursiv">I</button>
        <button class="tb-btn u" data-cmd="underline" title="Unterstrichen">U</button>
        <button class="tb-btn s" data-cmd="strikeThrough" title="Durchgestrichen">S</button>
        <div class="tb-sep"></div>
        <select class="tb-select" id="fontFamily" title="Schriftart">
          <option value="'Inter', sans-serif">Inter</option>
          <option value="'Space Grotesk', sans-serif">Space Grotesk</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="'Courier New', monospace">Courier New</option>
        </select>
        <select class="tb-select" id="fontSize" title="Schriftgröße">
          <option value="13">13</option>
          <option value="15" selected>15</option>
          <option value="18">18</option>
          <option value="22">22</option>
          <option value="28">28</option>
          <option value="36">36</option>
        </select>
        <div class="tb-sep"></div>
        <button class="tb-btn" data-cmd="justifyLeft" title="Linksbündig">⯇</button>
        <button class="tb-btn" data-cmd="justifyCenter" title="Zentriert">≡</button>
        <button class="tb-btn" data-cmd="justifyRight" title="Rechtsbündig">⯈</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" id="insertTableBtn" title="Tabelle einfügen">⊞</button>
        <button class="tb-btn" id="insertChecklistBtn" title="Checkliste einfügen">☑</button>
      </div>
      <div class="editor-wrap" id="editorWrap">
        <div class="editor" id="editor" contenteditable="true" data-placeholder="Schreib einfach los …">${currentNote.html || ''}</div>
        <div class="table-toolbar" id="tableToolbar">
          <button class="tt-add-row" title="Zeile hinzufügen">+ Zeile</button>
          <button class="tt-remove-row" title="Zeile entfernen">− Zeile</button>
          <div class="tb-sep"></div>
          <button class="tt-add-col" title="Spalte hinzufügen">+ Spalte</button>
          <button class="tt-remove-col" title="Spalte entfernen">− Spalte</button>
          <div class="tb-sep"></div>
          <button class="tt-delete" title="Tabelle löschen">🗑 Löschen</button>
        </div>
      </div>
    `;

    toolbarToggleBtn.classList.toggle('active', toolbarVisible);

    const titleInput = document.getElementById('titleInput');
    const editor = document.getElementById('editor');
    const editorWrap = document.getElementById('editorWrap');
    const fontFamily = document.getElementById('fontFamily');
    const fontSize = document.getElementById('fontSize');
    const toolbarEl = document.getElementById('toolbar');
    const tableToolbar = document.getElementById('tableToolbar');
    let currentTable = null;

    function scheduleSave(){
      markUnsaved();
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        currentNote.title = titleInput.value;
        currentNote.html = editor.innerHTML;
      }, 300);
    }

    titleInput.addEventListener('input', scheduleSave);
    editor.addEventListener('input', scheduleSave);

    toolbarEl.querySelectorAll('[data-cmd]').forEach(btn => {
      btn.addEventListener('click', () => {
        editor.focus();
        document.execCommand(btn.dataset.cmd, false, null);
      });
    });

    fontFamily.addEventListener('change', () => {
      editor.focus();
      document.execCommand('fontName', false, fontFamily.value);
      scheduleSave();
    });

    fontSize.addEventListener('change', () => {
      editor.focus();
      applyFontSize(editor, fontSize.value);
      scheduleSave();
    });

    document.getElementById('insertTableBtn').addEventListener('click', () => {
      openTableSizeModal((rows, cols) => {
        editor.focus();
        insertTable(editor, rows, cols);
        scheduleSave();
      });
    });

    document.getElementById('insertChecklistBtn').addEventListener('click', () => {
      editor.focus();
      insertChecklistItem(editor);
      scheduleSave();
    });

    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Enter'){
        const sel = window.getSelection();
        if (!sel.rangeCount) return;
        const node = sel.anchorNode;
        const parentSpan = node && node.nodeType === 3 ? node.parentElement : node;
        const checklistItem = parentSpan ? parentSpan.closest('.checklist-item') : null;
        if (checklistItem){
          e.preventDefault();
          insertChecklistItem(editor, checklistItem);
          scheduleSave();
        }
      }
    });

    editor.addEventListener('change', (e) => {
      if (e.target.matches && e.target.matches('.checklist-item input[type="checkbox"]')){
        const item = e.target.closest('.checklist-item');
        item.classList.toggle('checked', e.target.checked);
        scheduleSave();
      }
    });

    editor.addEventListener('click', (e) => {
      const delBtn = e.target.closest && e.target.closest('.checklist-del-btn');
      if (delBtn){
        const item = delBtn.closest('.checklist-item');
        if (item) item.remove();
        scheduleSave();
      }
    });

    function positionTableToolbar(table){
      const tRect = table.getBoundingClientRect();
      const wRect = editorWrap.getBoundingClientRect();
      tableToolbar.style.top = (tRect.top - wRect.top + editorWrap.scrollTop - 42) + 'px';
      tableToolbar.style.left = (tRect.left - wRect.left) + 'px';
      tableToolbar.style.display = 'flex';
    }

    function showTableToolbarFor(table){
      currentTable = table;
      positionTableToolbar(table);
    }

    function hideTableToolbar(){
      tableToolbar.style.display = 'none';
      currentTable = null;
    }

    editor.addEventListener('focusin', (e) => {
      const td = e.target.closest && e.target.closest('td');
      if (td){
        const table = td.closest('table.note-table');
        if (table) showTableToolbarFor(table);
      }
    });

    editor.addEventListener('click', (e) => {
      const table = e.target.closest && e.target.closest('table.note-table');
      if (table) showTableToolbarFor(table);
    });

    tableToolbar.querySelector('.tt-add-row').addEventListener('click', () => {
      if (!currentTable) return;
      addTableRow(currentTable);
      positionTableToolbar(currentTable);
      scheduleSave();
    });
    tableToolbar.querySelector('.tt-remove-row').addEventListener('click', () => {
      if (!currentTable) return;
      removeTableRow(currentTable);
      positionTableToolbar(currentTable);
      scheduleSave();
    });
    tableToolbar.querySelector('.tt-add-col').addEventListener('click', () => {
      if (!currentTable) return;
      addTableCol(currentTable);
      positionTableToolbar(currentTable);
      scheduleSave();
    });
    tableToolbar.querySelector('.tt-remove-col').addEventListener('click', () => {
      if (!currentTable) return;
      removeTableCol(currentTable);
      positionTableToolbar(currentTable);
      scheduleSave();
    });
    tableToolbar.querySelector('.tt-delete').addEventListener('click', () => {
      if (!currentTable) return;
      currentTable.remove();
      hideTableToolbar();
      scheduleSave();
    });

    if (outsideClickHandler){
      document.removeEventListener('click', outsideClickHandler, true);
    }
    outsideClickHandler = function(e){
      if (tableToolbar.contains(e.target)) return;
      if (e.target.closest && e.target.closest('table.note-table')) return;
      hideTableToolbar();
    };
    document.addEventListener('click', outsideClickHandler, true);

    editor.focus();
  }

  /* ---------- Formatting helpers ---------- */
  function applyFontSize(editor, px){
    document.execCommand('fontSize', false, '7');
    editor.querySelectorAll('font[size="7"]').forEach(el => {
      el.removeAttribute('size');
      el.style.fontSize = px + 'px';
    });
  }

  function insertTable(editor, rows, cols){
    rows = Math.max(1, Math.min(12, rows || 3));
    cols = Math.max(1, Math.min(10, cols || 3));
    let html = '<table class="note-table"><tbody>';
    for (let r = 0; r < rows; r++){
      html += '<tr>';
      for (let c = 0; c < cols; c++){
        html += '<td contenteditable="true">&nbsp;</td>';
      }
      html += '</tr>';
    }
    html += '</tbody></table><p><br></p>';
    document.execCommand('insertHTML', false, html);
  }

  function addTableRow(table){
    const rows = table.querySelectorAll('tr');
    const colCount = rows.length ? rows[0].children.length : 1;
    const tr = document.createElement('tr');
    for (let i = 0; i < colCount; i++){
      const td = document.createElement('td');
      td.setAttribute('contenteditable', 'true');
      td.innerHTML = '&nbsp;';
      tr.appendChild(td);
    }
    table.querySelector('tbody').appendChild(tr);
  }

  function removeTableRow(table){
    const tbody = table.querySelector('tbody');
    if (tbody.children.length > 1) tbody.removeChild(tbody.lastElementChild);
  }

  function addTableCol(table){
    table.querySelectorAll('tr').forEach(tr => {
      const td = document.createElement('td');
      td.setAttribute('contenteditable', 'true');
      td.innerHTML = '&nbsp;';
      tr.appendChild(td);
    });
  }

  function removeTableCol(table){
    const rows = table.querySelectorAll('tr');
    if (rows.length && rows[0].children.length > 1){
      rows.forEach(tr => tr.removeChild(tr.lastElementChild));
    }
  }

  function insertChecklistItem(editor, afterEl){
    const div = document.createElement('div');
    div.className = 'checklist-item';
    div.setAttribute('contenteditable', 'false');

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';

    const span = document.createElement('span');
    span.setAttribute('contenteditable', 'true');
    span.textContent = '';

    const delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.className = 'checklist-del-btn';
    delBtn.title = 'Punkt löschen';
    delBtn.innerHTML = '&times;';

    div.appendChild(checkbox);
    div.appendChild(span);
    div.appendChild(delBtn);

    if (afterEl && afterEl.parentNode){
      afterEl.parentNode.insertBefore(div, afterEl.nextSibling);
    } else {
      editor.appendChild(div);
    }

    const range = document.createRange();
    range.selectNodeContents(span);
    range.collapse(true);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    span.focus();
  }

  /* ---------- Table size modal ---------- */
  function openTableSizeModal(onConfirm){
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `
      <div class="modal-box">
        <h3>Tabellengröße</h3>
        <div class="modal-row">
          <label>Zeilen<input type="number" id="modalRows" min="1" max="12" value="3"></label>
          <label>Spalten<input type="number" id="modalCols" min="1" max="10" value="3"></label>
        </div>
        <div class="modal-actions">
          <button class="modal-btn cancel" id="modalCancelBtn">Abbrechen</button>
          <button class="modal-btn confirm" id="modalConfirmBtn">Einfügen</button>
        </div>
      </div>`;
    document.body.appendChild(backdrop);

    const close = () => backdrop.remove();
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) close(); });
    backdrop.querySelector('#modalCancelBtn').addEventListener('click', close);
    backdrop.querySelector('#modalConfirmBtn').addEventListener('click', () => {
      const rows = parseInt(backdrop.querySelector('#modalRows').value, 10) || 3;
      const cols = parseInt(backdrop.querySelector('#modalCols').value, 10) || 3;
      close();
      onConfirm(rows, cols);
    });
    backdrop.querySelector('#modalRows').focus();
  }

  /* ---------- Init ---------- */
  markSaved();
  renderEditor();
})();
</script>
</body>
</html>
